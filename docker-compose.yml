version: "3.9"

# =============================================================================
# docker-compose.yml — Germany Browser Automation Stack
#
# All ports and secrets are read from .env (never hardcoded here).
# Ports exposed:
#   ${CONTROL_PANEL_PORT} → FastAPI control panel  (Launch / Kill browser)
#   ${VNC_PORT}           → noVNC live stream       (view & interact)
#   5900                  → Raw VNC (internal; for native VNC clients)
# =============================================================================

services:
  browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: german_browser

    # Injects all variables from .env into the container environment.
    # Docker Compose also reads .env automatically for ${VAR} substitution
    # in this file (ports, etc.), so a single .env drives everything.
    env_file:
      - .env

    ports:
      # Control panel — access at http://<DROPLET_PUBLIC_IP>:${CONTROL_PANEL_PORT}/?key=<API_SECRET_KEY>
      - "${CONTROL_PANEL_PORT}:${CONTROL_PANEL_PORT}"
      # noVNC web stream
      - "${VNC_PORT}:${VNC_PORT}"
      # Raw VNC (optional — for native clients like RealVNC / TigerVNC)
      - "5900:5900"

    environment:
      # Explicit DISPLAY override ensures Chromium targets the right Xvfb screen.
      # The other variables (TARGET_URL, API_SECRET_KEY, etc.) come from env_file.
      - DISPLAY=:99

    # 2 GB shared memory — Chromium needs substantially more than Docker's
    # default 64 MB /dev/shm.  --disable-dev-shm-usage in Chromium args
    # redirects to /tmp as a secondary safety net.
    shm_size: "2gb"

    # Relaxed seccomp profile so Chrome's process-level sandboxing still
    # works inside the container even without kernel namespace support.
    security_opt:
      - seccomp=unconfined

    # Restart the container automatically unless explicitly stopped.
    restart: unless-stopped

    # Persist the Playwright/Chromium binary cache across rebuilds so
    # Chromium is not re-downloaded every time `docker compose up --build` runs.
    volumes:
      - playwright_cache:/root/.cache/ms-playwright

volumes:
  playwright_cache:
